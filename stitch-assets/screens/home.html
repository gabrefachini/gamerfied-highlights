<p class="font-body-lg text-body-lg text-secondary mb-stack-lg">Upload a demo or paste a match link.</p>

<p class="font-label-sm text-label-sm text-outline group-hover:text-primary uppercase tracking-widest">Select demo file</p>
</div>

<div class="flex flex-col gap-4 w-full">
<button class="w-full bg-primary text-on-primary py-5 rounded-none font-label-sm text-label-sm uppercase tracking-widest hover:opacity-90 transition-all active:scale-[0.98]">

                </button>
<button class="w-full bg-surface-container-lowest text-primary border border-outline-variant py-5 rounded-none font-label-sm text-label-sm uppercase tracking-widest hover:bg-surface-variant transition-all active:scale-[0.98]">
