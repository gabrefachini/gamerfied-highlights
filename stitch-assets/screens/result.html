<style>

<body class="font-body-md text-body-md selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface border-b border-outline-variant">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer hover:opacity-70 transition-opacity" data-icon="grid_view">grid_view</span>
<h1 class="text-headline-md font-headline-md font-extrabold tracking-tighter text-primary">GAMERFIED HIGHLIGHTS</h1>
</div>
<nav class="hidden md:flex gap-8">
<a class="text-primary font-bold text-label-sm hover:opacity-70 transition-opacity" href="#">HOME</a>
<a class="text-secondary text-label-sm hover:opacity-70 transition-opacity" href="#">FEED</a>
<a class="text-secondary text-label-sm hover:opacity-70 transition-opacity" href="#">LIBRARY</a>
<a class="text-secondary text-label-sm hover:opacity-70 transition-opacity" href="#">PROFILE</a>
</nav>
</div>
</header>
<!-- Main Content -->
<main class="pt-32 pb-margin-desktop px-margin-mobile md:px-0">
<div class="max-w-[800px] mx-auto">
<!-- Result Headline -->
<div class="mb-stack-lg">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary text-left">Highlight ready.</h2>
</div>
<!-- Video Preview Placeholder -->
<div class="relative group aspect-video bg-surface-container overflow-hidden rounded-xl border border-outline-variant video-container mb-stack-lg">
<img alt="Gameplay Preview" class="w-full h-full object-cover grayscale-0 transition-transform duration-700 group-hover:scale-105" data-alt="A cinematic gaming highlight still showcasing a high-octane competitive shooter match. The scene features detailed urban architecture under a dramatic, moody sunset lighting that casts long shadows. The color palette is sophisticated, focusing on deep blacks, sharp whites, and subtle neutral tones to maintain a premium editorial feel. The image captures a moment of intense action with sharp focus and clean edges, avoiding traditional flashy gaming glows for a more grounded, professional aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDSICSgYRf0xPezCouOhs5Q7p9X8rqdfmk-tla3iadPMjiB6CUqUfENHBwKwwyRCrFGYfCTpBnkdF7zQRva7iMRBQAlAWi5a8i6UpBlmdkNESD-c9DjvdNSikbFIOhWf69Mn658SL9Ym6que935t9aT28E0kHQNWRm1sRO1vwixCYAjiydII5vGBLgA4Aly2VTrGk5d5yGn6dqDkh2aKa3ucnB7JhUdVRnW1gYv06NpBz6qChjLhxgCKY0WpjVyuQKQua3Wt9qZxY8"/>
<!-- Watch Label Overlay (Design System Rule) -->
<div class="watch-label absolute bottom-4 right-4 bg-primary text-on-primary px-4 py-2 text-label-sm uppercase opacity-0 transition-opacity duration-300 font-bold">
                    Watch
                </div>
<!-- Status Indicator (Design System Rule) -->
<div class="absolute top-4 left-4 flex items-center gap-2 bg-surface/80 backdrop-blur-md px-3 py-1 rounded-full border border-outline-variant">
<span class="w-2 h-2 rounded-full bg-[#22C55E]"></span>
<span class="text-label-sm text-primary">READY</span>
</div>
</div>
<!-- Action Cluster -->
<div class="flex flex-col gap-4 w-full">
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-5 font-bold text-label-sm tracking-widest uppercase hover:opacity-90 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="download">download</span>
                    Download
                </button>
<!-- Secondary Actions -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<button class="w-full bg-surface border border-outline-variant text-primary py-5 font-bold text-label-sm tracking-widest uppercase hover:bg-surface-container transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="link">link</span>
                        Copy Link
                    </button>
<button class="w-full bg-surface border border-outline-variant text-primary py-5 font-bold text-label-sm tracking-widest uppercase hover:bg-surface-container transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="ios_share">ios_share</span>
                        Share
                    </button>
</div>
</div>
<!-- Metadata / Details -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant flex justify-between items-center">
<div class="flex gap-2">
<span class="text-label-sm text-secondary bg-surface-container px-3 py-1 rounded-sm uppercase">4K ULTRA</span>
<span class="text-label-sm text-secondary bg-surface-container px-3 py-1 rounded-sm uppercase">60 FPS</span>
</div>
<div class="text-label-sm text-outline uppercase font-semibold">
                    12.4 MB • MP4
                </div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile only) -->
<footer class="md:hidden">
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface border-t border-outline-variant px-margin-mobile pb-6 pt-2">
<a class="flex flex-col items-center justify-center text-outline pt-2 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-label-sm uppercase mt-1">HOME</span>
</a>
<a class="flex flex-col items-center justify-center text-outline pt-2 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="movie_filter">movie_filter</span>
<span class="text-label-sm uppercase mt-1">FEED</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold border-t-2 border-primary pt-2 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="folder_special">folder_special</span>
<span class="text-label-sm uppercase mt-1">LIBRARY</span>
</a>
<a class="flex flex-col items-center justify-center text-outline pt-2 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-label-sm uppercase mt-1">PROFILE</span>
</a>
</nav>
</footer>
<script>
        // Micro-interaction for feedback on button clicks
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function() {
                const originalText = this.innerHTML;
                const isPrimary = this.classList.contains('bg-primary');
                
                if (this.innerText.includes('COPY LINK')) {
                    this.innerHTML = `<span class="material-symbols-outlined">check</span> LINK COPIED`;
                    setTimeout(() => {
                        this.innerHTML = originalText;
                    }, 2000);
                }
            });
        });

        // Tonal layer shift on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-sm');
            } else {
                header.classList.remove('shadow-sm');
            }
        });
    </script>
</body></html>
