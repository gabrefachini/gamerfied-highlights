<html class="light" lang="en"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                "on-secondary-fixed-variant": "#454747",

                "outline-variant": "#cfc4c5",
                "surface-container": "#eeeeee",
                "outline": "#7e7576",
                "on-primary": "#ffffff",
                "on-primary-fixed-variant": "#474747",
                "on-primary-fixed": "#1b1b1b",
                "secondary-fixed-dim": "#c6c6c7",
                "error": "#ba1a1a",
                "secondary-fixed": "#e2e2e2",
                "primary": "#000000",
                "surface": "#f9f9f9",
                "on-tertiary-fixed-variant": "#474747",
                "surface-bright": "#f9f9f9",
                "error-container": "#ffdad6",
                "on-surface": "#1b1b1b",
                "inverse-primary": "#c6c6c6",
                "inverse-on-surface": "#f1f1f1",
                "surface-container-lowest": "#ffffff",

                "surface-container-low": "#f3f3f3",

                "on-secondary-container": "#616363",
                "secondary-container": "#dfe0e0",
                "primary-container": "#1b1b1b",
                "primary-fixed": "#e2e2e2",
                "inverse-surface": "#303030",
                "surface-container-highest": "#e2e2e2",
                "tertiary-fixed": "#e2e2e2",
                "on-secondary-fixed": "#1a1c1c",
                "on-secondary": "#ffffff",

<style>
        body {
            background-color: #ffffff;
            color: #000000;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes progress-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .shimmer-bar::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), transparent);
            animation: progress-shimmer 1.5s infinite linear;
        }

        .scanning-line {
            height: 1px;
            background: #000;
            width: 100%;
            position: absolute;
            top: 0;
            animation: scan 3s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }

        .step-transition {
            transition: opacity 0.5s ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop overflow-hidden">
<!-- Processing Shell -->
<main class="w-full max-w-2xl flex flex-col items-center text-center space-y-stack-lg">
<!-- Status Indicator Area -->
<div class="relative w-full space-y-stack-md">
<!-- Animated Content Container -->
<div class="flex flex-col items-center justify-center">
<h1 class="font-display text-headline-lg-mobile md:text-display text-primary tracking-tighter mb-4" id="main-status">
                    Analyzing match...
                </h1>
<p class="font-body-lg text-body-lg text-outline uppercase tracking-widest step-transition" id="secondary-status">
                    Finding highlights...
                </p>
</div>
<!-- Minimal Progress Bar -->
<div class="w-full max-w-md mx-auto h-[2px] bg-outline-variant relative overflow-hidden mt-12">
<div class="absolute left-0 top-0 h-full bg-primary transition-all duration-700 ease-out shimmer-bar" id="progress-indicator" style="width: 12%"></div>
</div>
<!-- Tonal Indicator (Small status dot) -->
<div class="flex items-center justify-center space-x-2 mt-8">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label-sm text-label-sm text-outline">SYSTEMS NOMINAL</span>
</div>
</div>
</main>
<!-- Asymmetric Branding Anchor -->
<div class="fixed bottom-margin-desktop left-margin-desktop hidden md:block">
<p class="font-display text-headline-md font-extrabold tracking-tighter opacity-10">GAMERFIED</p>
</div>
<!-- Data Stream Visualization (Subtle Vanilla JS Interaction) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] overflow-hidden z-[-1]" id="stream-container">
<!-- JS will populate subtle hex strings or numbers to create atmosphere -->
</div>
<script>
        // Progress Logic
        const progress = document.getElementById('progress-indicator');
        const mainStatus = document.getElementById('main-status');
        const secondaryStatus = document.getElementById('secondary-status');
        
        const secondaryMessages = [
            'Finding highlights...',
            'Preparing moments...',
            'Calculating kill-death ratios...',
            'Syncing meta-data...',
            'Refining clip transitions...',
            'Optimizing bitrates...'
        ];

        let currentProgress = 12;
        let messageIndex = 0;

        const updateUI = () => {
            // Increment progress slowly and randomly
            currentProgress += Math.random() * 5;
            if (currentProgress > 98) currentProgress = 98;
            progress.style.width = `${currentProgress}%`;

            // Cycle secondary text
            if (Math.random() > 0.7) {
                messageIndex = (messageIndex + 1) % secondaryMessages.length;
                secondaryStatus.style.opacity = 0;
                setTimeout(() => {
                    secondaryStatus.textContent = secondaryMessages[messageIndex];
                    secondaryStatus.style.opacity = 1;
                }, 500);
            }
        };

        const interval = setInterval(updateUI, 2000);

        // Atmosphere Generator
        const streamContainer = document.getElementById('stream-container');
        const generateStream = () => {
            for(let i = 0; i < 20; i++) {
                const stream = document.createElement('div');
                stream.className = 'absolute font-label-sm text-label-sm whitespace-nowrap transition-all duration-[10000ms]';
                stream.style.left = `${Math.random() * 100}%`;
                stream.style.top = `${Math.random() * 100}%`;
                stream.textContent = Math.random().toString(16).substring(2, 15).toUpperCase();
                streamContainer.appendChild(stream);
                
                // Slowly float up
                setTimeout(() => {
                    stream.style.transform = `translateY(-200px)`;
                    stream.style.opacity = '0';
                }, 100);

                // Cleanup
                setTimeout(() => stream.remove(), 10000);
            }
        };

        setInterval(generateStream, 3000);
        generateStream();

        // Simulate finish after 15 seconds
        setTimeout(() => {
            clearInterval(interval);
            progress.style.width = '100%';
            mainStatus.textContent = 'Match Ready.';
            secondaryStatus.textContent = 'Finalizing export...';
        }, 15000);
    </script>
</body></html>
