services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gamerfied_highlights
      POSTGRES_USER: highlights
      POSTGRES_PASSWORD: highlights
    ports:
      - "5433:5432"
    volumes:
      - highlights-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  highlights-postgres:
